name: AI Service Python Tests

on:
  push:
    paths:
      - "ai-service-python/**"
      - ".github/workflows/ai-service-python-tests.yml"
  pull_request:
    paths:
      - "ai-service-python/**"
      - ".github/workflows/ai-service-python-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service-python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q